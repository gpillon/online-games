replicaCount:
  frontend: 1
  backend: 1

image:
  frontend:
    repository: ghcr.io/gpillon/online-games-frontend
    tag: "3da9be6"
    pullPolicy: IfNotPresent
  backend:
    repository: ghcr.io/gpillon/online-games-backend
    tag: "3da9be6"
    pullPolicy: IfNotPresent

service:
  frontend:
    type: ClusterIP
    port: 80
  backend:
    type: ClusterIP
    port: 3001

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  host: carte.the.magesgate.com
  tls:
    enabled: true
    secretName: online-games-tls

backend:
  cnpgSecretName: "online-games-pg-app"
  env:
    DB_HOST: "online-games-pg-rw"
    DB_PORT: "5432"
    DB_NAME: "online_games"
    DB_USER: "app"
    JWT_EXPIRATION: "7d"
    TYPEORM_SYNC: "true"
    FRONTEND_URL: "https://carte.the.magesgate.com"
    PORT: "3001"
  secrets:
    JWT_SECRET: "arena-di-carte-jwt-prod-secret-2026"
    SMTP_HOST: ""
    SMTP_PORT: "587"
    SMTP_USER: ""
    SMTP_PASS: ""
    SMTP_FROM: ""

postgresql:
  enabled: false

resources:
  frontend:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  backend:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

autoscaling:
  enabled: false
