apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "online-games.fullname" . }}-backend
  labels:
    {{- include "online-games.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      {{- include "online-games.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "online-games.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if not (index .Values.backend.env "FRONTEND_URL") }}
            - name: FRONTEND_URL
              value: "https://{{ .Values.ingress.host }}"
            {{- end }}
            {{- if .Values.backend.cnpgSecretName }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.cnpgSecretName }}
                  key: password
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "online-games.fullname" . }}-backend-secrets
          livenessProbe:
            httpGet:
              path: /api
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /api
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 10
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
