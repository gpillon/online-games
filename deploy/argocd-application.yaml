apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-games
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: online-games
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://gpillon.github.io/online-games/
    chart: online-games
    targetRevision: "*"
    helm:
      releaseName: online-games
      valuesObject:
        replicaCount:
          frontend: 1
          backend: 1

        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - kube-worker-nwi1k

        image:
          frontend:
            pullPolicy: IfNotPresent
          backend:
            pullPolicy: IfNotPresent

        ingress:
          enabled: true
          className: nginx
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
            nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
            nginx.ingress.kubernetes.io/proxy-body-size: "10m"
            nginx.ingress.kubernetes.io/configuration-snippet: |
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          host: carte.the.magesgate.com
          tls:
            enabled: true
            secretName: online-games-tls

        backend:
          cnpgSecretName: "online-games-pg-app"
          env:
            DB_HOST: "online-games-pg-rw"
            DB_PORT: "5432"
            DB_NAME: "online_games"
            DB_USER: "app"
            JWT_EXPIRATION: "7d"
            TYPEORM_SYNC: "true"
            FRONTEND_URL: "https://carte.the.magesgate.com"
            PORT: "3001"
          secrets:
            JWT_SECRET: "arena-di-carte-jwt-prod-secret-2026"
            SMTP_HOST: ""
            SMTP_PORT: "587"
            SMTP_USER: ""
            SMTP_PASS: ""
            SMTP_FROM: ""

        postgresql:
          enabled: false

        resources:
          frontend:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          backend:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
