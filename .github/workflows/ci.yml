name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            shared/package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install & build shared
        run: cd shared && npm ci && npm run build

      - name: Install & build backend
        run: cd backend && npm ci && npx nest build

      - name: Install & build frontend
        run: cd frontend && npm ci && npm run build

  build-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - component: backend
            dockerfile: backend/Dockerfile
            image_env: BACKEND_IMAGE
          - component: frontend
            dockerfile: frontend/Dockerfile
            image_env: FRONTEND_IMAGE
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  package-helm:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Update Chart appVersion
        run: |
          SHA=${GITHUB_SHA::7}
          sed -i "s/appVersion:.*/appVersion: \"${SHA}\"/" helm/online-games/Chart.yaml
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            sed -i "s/version:.*/version: ${VERSION}/" helm/online-games/Chart.yaml
          fi

      - name: Update image tags in values
        run: |
          SHA=${GITHUB_SHA::7}
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s|repository: ghcr.io/OWNER/online-games-frontend|repository: ghcr.io/${REPO_LOWER}-frontend|" helm/online-games/values.yaml
          sed -i "s|repository: ghcr.io/OWNER/online-games-backend|repository: ghcr.io/${REPO_LOWER}-backend|" helm/online-games/values.yaml
          sed -i "s|tag: latest|tag: ${SHA}|g" helm/online-games/values.yaml

      - name: Package Helm chart
        run: |
          mkdir -p helm-packages
          helm package helm/online-games -d helm-packages

      - name: Generate Helm repo index
        run: |
          if [ -f helm-packages/index.yaml ]; then
            helm repo index helm-packages --merge helm-packages/index.yaml --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          else
            helm repo index helm-packages --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: helm-packages

  deploy-pages:
    needs: package-helm
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
